<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop stop-color="#5eead4" stop-opacity="0.18"/>
      <stop offset="0.6" stop-color="#a78bfa" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- grid lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- logo -->
  <g transform="translate(80, 80)">
    <path d="M16 3a13 13 0 1 0 0 26 13 13 0 0 0 0-26Zm0 4a9 9 0 0 1 8.485 12L13 13.515A4 4 0 0 1 16 11.515V7Zm-3.515 9.515L23.485 23.5A9 9 0 0 1 12.485 16.515Z" fill="url(#accent)"/>
    <text x="44" y="24" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" fill="#ededed">Continuum</text>
  </g>

  <!-- tag pill -->
  <g transform="translate(80, 220)">
    <rect width="172" height="32" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
    <circle cx="18" cy="16" r="3" fill="#5eead4"/>
    <text x="32" y="20" font-family="ui-monospace, monospace" font-size="12" fill="#9ca3af" letter-spacing="0.06em">PUBLIC PREVIEW · v0.1</text>
  </g>

  <!-- main title -->
  <text x="80" y="340" font-family="ui-sans-serif, system-ui, sans-serif" font-size="76" font-weight="600" fill="#ffffff" letter-spacing="-0.02em">Give your AI a memory</text>
  <text x="80" y="430" font-family="ui-sans-serif, system-ui, sans-serif" font-size="76" font-weight="600" fill="url(#accent)" letter-spacing="-0.02em">that actually remembers.</text>

  <!-- subtitle -->
  <text x="80" y="500" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" fill="#9ca3af">Context intelligence for AI applications. 5 lines of code.</text>

  <!-- bottom code line -->
  <g transform="translate(80, 550)">
    <rect width="600" height="44" rx="6" fill="#0d0d0d" stroke="rgba(255,255,255,0.08)"/>
    <text x="20" y="28" font-family="ui-monospace, monospace" font-size="16" fill="#9ca3af">const mem = new Continuum({ apiKey: </text>
    <text x="370" y="28" font-family="ui-monospace, monospace" font-size="16" fill="#5eead4">process.env.KEY</text>
    <text x="540" y="28" font-family="ui-monospace, monospace" font-size="16" fill="#9ca3af"> });</text>
  </g>
</svg>
